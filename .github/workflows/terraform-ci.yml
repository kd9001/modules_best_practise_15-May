name: Terraform CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: ["main"]  
  

permissions:
    id-token: write
    contents: read    

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: GitHub Actions Timeline
        uses: Kesin11/actions-timeline@v2
          
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
         client-id: ${{secrets.AZURE_CLIENT_ID}}
         tenant-id: ${{secrets.AZURE_TENANT_ID}}
         subscription-id: ${{secrets.AZURE_SUBSCRIPTION_ID}}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.4"
      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        env:
          TF_VAR_vm_password: ${{ secrets.VM_ADMIN_PASSWORD }}
        run: terraform plan -input=false -var-file="terraform.tfvars" -out=tfplan

      - name: Save human-readable plan
        run: terraform show -no-color tfplan > tfplan.txt

      - name: Upload Terraform plan (binary)
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan

      - name: Upload Terraform plan (readable)
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-text
          path: tfplan.txt
        
