name: Terraform CI

on:
  push:
    branches: [ "main" ]
  

permissions:
    id-token: write
    contents: read    

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: GitHub Actions Timeline
        uses: Kesin11/actions-timeline@v2
          
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
         client-id: f2d6b47c-ac15-4469-b5d9-00afcaf98460 
         tenant-id: 1ce7e532-f62f-49bc-91b1-3716ea39804c  
         subscription-id: 2af005be-2d1e-433d-9706-23de28efc5b5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan (save output)
        run: terraform plan -out=tfplan

      - name: Save human-readable plan
        run: terraform show -no-color tfplan > tfplan.txt

      - name: Upload Terraform plan (binary)
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan

      - name: Upload Terraform plan (readable)
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-text
          path: tfplan.txtn  
        
